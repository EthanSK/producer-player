name: Bug report
description: Report a reproducible issue in Producer Player.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this.
        A clear repro helps us fix bugs faster.

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Which version are you using?
      placeholder: "Example: 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Open Producer Player
        2. Link folder...
        3. Click...
        4. Observe issue
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should have happened?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What happened instead? Include any error text shown in-app."
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: Logs, screenshots, or sample files (optional)
      description: Add anything that can help reproduce or diagnose the issue.
