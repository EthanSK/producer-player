name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-build:
    name: Node build + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: |
          npm --prefix packages/contracts run typecheck
          npm --prefix packages/domain run typecheck
          npm --prefix apps/renderer run typecheck
          npm --prefix apps/electron run typecheck
          npm --prefix apps/e2e run typecheck

      - name: Build workspaces
        run: |
          npm --prefix packages/contracts run build
          npm --prefix packages/domain run build
          npm --prefix apps/renderer run build
          npm --prefix apps/electron run build

  swift-build:
    name: Swift MVP build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Swift package
        run: swift build
