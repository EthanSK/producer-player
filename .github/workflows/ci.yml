name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  node-build:
    name: Node build + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: |
          npm run build -w packages/contracts
          npm run build -w packages/domain
          npm run typecheck -w apps/renderer
          npm run typecheck -w apps/electron
          npm run typecheck -w apps/e2e

      - name: Build workspaces
        run: |
          npm run build -w packages/contracts
          npm run build -w packages/domain
          npm run build -w apps/renderer
          npm run build -w apps/electron

  runtime-smoke:
    name: Runtime smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app for Electron runtime tests
        run: npm run build

      - name: Run runtime smoke tests
        env:
          PLAYWRIGHT_WORKERS: 2
        run: npm run ci -w @producer-player/e2e -- --grep @smoke
