name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-build:
    name: Node build + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: |
          npm run typecheck -w packages/contracts
          npm run typecheck -w packages/domain
          npm run build -w packages/contracts
          npm run build -w packages/domain
          npm run typecheck -w apps/renderer
          npm run typecheck -w apps/electron
          npm run typecheck -w apps/e2e

      - name: Build workspaces
        run: |
          npm run build -w packages/contracts
          npm run build -w packages/domain
          npm run build -w apps/renderer
          npm run build -w apps/electron

  swift-build:
    name: Swift MVP build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Swift package
        run: swift build
