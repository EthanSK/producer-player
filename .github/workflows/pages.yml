name: Deploy landing page
run-name: >-
  ${{ (github.event.head_commit
      && startsWith(github.event.head_commit.message, 'chore: bump version')
      && github.event.commits[0].message != github.event.head_commit.message
      && github.event.commits[0].message)
      || (github.event.head_commit && github.event.head_commit.message)
      || '' }}

on:
  push:
    branches:
      - main
      - master
    paths:
      - site/**
      - package.json
      - scripts/sync-version.mjs
      - scripts/check-version-consistency.mjs
      - .github/workflows/pages.yml
      - README.md
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync landing page version metadata
        run: npm run version:sync

      - name: Validate landing page files
        run: |
          test -f site/index.html
          test -f site/styles.css
          test -f site/robots.txt
          test -f site/sitemap.xml
          test -f site/favicon.ico
          test -f site/favicon-16x16.png
          test -f site/favicon-32x32.png
          test -f site/favicon-48x48.png
          test -f site/favicon-96x96.png
          test -f site/apple-touch-icon.png
          test -f site/android-chrome-192x192.png
          test -f site/android-chrome-512x512.png
          test -f site/site.webmanifest
          test -f site/version.json
          npm run version:check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
