name: Desktop prebuilt releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS unsigned prebuilt
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned macOS package
        run: npm run release:desktop:mac

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          set -euo pipefail
          for f in release/Producer-Player-*-mac-*.zip; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ github.ref_name || 'snapshot' }}
          path: |
            release/Producer-Player-*-mac-*.zip
            release/Producer-Player-*-mac-*.zip.sha256
            release/Producer-Player-*-mac-*.zip.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-macos-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      - name: Show assets
        run: ls -lah release-assets

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: .github/RELEASE_NOTES_TEMPLATE.md
          files: |
            release-assets/*
