name: Desktop prebuilt releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  compute-version:
    name: Compute build/release version
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.meta.outputs.build_version }}
      snapshot_tag: ${{ steps.meta.outputs.snapshot_tag }}
      snapshot_name: ${{ steps.meta.outputs.snapshot_name }}
      is_snapshot: ${{ steps.meta.outputs.is_snapshot }}
      is_tag_release: ${{ steps.meta.outputs.is_tag_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(node -p "require('./package.json').version")"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            echo "build_version=${tag_version}" >> "$GITHUB_OUTPUT"
            echo "snapshot_tag=" >> "$GITHUB_OUTPUT"
            echo "snapshot_name=" >> "$GITHUB_OUTPUT"
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
            snapshot_version="${base_version}-${GITHUB_REF_NAME}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            echo "build_version=${snapshot_version}" >> "$GITHUB_OUTPUT"
            echo "snapshot_tag=desktop-snapshot-${snapshot_version}" >> "$GITHUB_OUTPUT"
            echo "snapshot_name=Desktop snapshot (${GITHUB_REF_NAME}) ${snapshot_version}" >> "$GITHUB_OUTPUT"
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "build_version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "snapshot_tag=" >> "$GITHUB_OUTPUT"
          echo "snapshot_name=" >> "$GITHUB_OUTPUT"
          echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          echo "is_tag_release=false" >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Build desktop unsigned (${{ matrix.slug }})
    needs: compute-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            slug: mac
          - runner: ubuntu-latest
            slug: linux
          - runner: windows-latest
            slug: win

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build version (tags + main snapshots)
        if: needs.compute-version.outputs.is_snapshot == 'true' || needs.compute-version.outputs.is_tag_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ needs.compute-version.outputs.build_version }}" --no-git-tag-version --allow-same-version

      - name: Build unsigned desktop package
        run: npm run release:desktop:${{ matrix.slug }}

      - name: Generate SHA-256 checksum (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release/Producer-Player-*-${{ matrix.slug }}-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No ZIP artifacts found for ${{ matrix.slug }}"
            exit 1
          fi
          for f in "${files[@]}"; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release -Filter "Producer-Player-*-win-*.zip"
          if (-not $files) { throw "No ZIP artifacts found for win" }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)" | Out-File -FilePath "$($file.FullName).sha256" -Encoding ascii
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.slug }}-${{ github.ref_name }}
          path: |
            release/Producer-Player-*-${{ matrix.slug }}-*.zip
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.sha256
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish tagged release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      - name: Show assets
        run: ls -lah release-assets

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          generate_release_notes: false
          body_path: .github/RELEASE_NOTES_TEMPLATE.md
          files: |
            release-assets/*

  publish-branch-snapshot:
    name: Publish versioned branch snapshot assets
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs:
      - compute-version
      - build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      - name: Show assets
        run: ls -lah release-assets

      - name: Publish snapshot GitHub Release (marked Latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute-version.outputs.snapshot_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.compute-version.outputs.snapshot_name }}
          prerelease: true
          make_latest: true
          generate_release_notes: false
          body: |
            Automated unsigned desktop snapshot for `${{ github.ref_name }}`.
            Version: `${{ needs.compute-version.outputs.build_version }}`
            Commit: `${{ github.sha }}`
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            release-assets/*
