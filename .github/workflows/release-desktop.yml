name: Desktop prebuilt releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build ${{ matrix.pretty }} prebuilt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            pretty: macOS
            script: release:desktop:mac
            artifact: macos
          - os: ubuntu-latest
            pretty: Linux
            script: release:desktop:linux
            artifact: linux
          - os: windows-latest
            pretty: Windows
            script: release:desktop:win
            artifact: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned prebuilt package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }}

      - name: Upload prebuilt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact }}-${{ github.ref_name || 'snapshot' }}
          path: |
            release/*.zip
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      - name: Show assets
        run: ls -lah release-assets

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Prebuilt desktop artifacts

            This release contains unsigned prebuilt desktop artifacts built by GitHub Actions.

            - macOS: zipped `.app` bundle
            - Windows: portable `.exe` plus zipped app bundle
            - Linux: `.AppImage` plus `.tar.gz`

            Signing/notarization is intentionally disabled in this workflow for immediate testability.
            See `docs/RELEASING.md` for optional signing secrets and rollout guidance.
          files: |
            release-assets/*
