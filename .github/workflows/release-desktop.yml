name: Desktop prebuilt releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop unsigned (${{ matrix.slug }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            slug: mac
          - runner: ubuntu-latest
            slug: linux
          - runner: windows-latest
            slug: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned desktop package
        run: npm run release:desktop:${{ matrix.slug }}

      - name: Generate SHA-256 checksum (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release/Producer-Player-*-${{ matrix.slug }}-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No ZIP artifacts found for ${{ matrix.slug }}"
            exit 1
          fi
          for f in "${files[@]}"; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release -Filter "Producer-Player-*-win-*.zip"
          if (-not $files) { throw "No ZIP artifacts found for win" }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)" | Out-File -FilePath "$($file.FullName).sha256" -Encoding ascii
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.slug }}-${{ github.ref_name }}
          path: |
            release/Producer-Player-*-${{ matrix.slug }}-*.zip
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.sha256
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish tagged release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      - name: Show assets
        run: ls -lah release-assets

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: .github/RELEASE_NOTES_TEMPLATE.md
          files: |
            release-assets/*

  publish-branch-snapshot:
    name: Publish rolling branch snapshot assets
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      - name: Show assets
        run: ls -lah release-assets

      - name: Compute snapshot release metadata
        id: snapshot
        shell: bash
        run: |
          set -euo pipefail
          echo "tag=desktop-${GITHUB_REF_NAME}-latest" >> "$GITHUB_OUTPUT"
          echo "name=Desktop snapshot (${GITHUB_REF_NAME})" >> "$GITHUB_OUTPUT"

      - name: Attach assets to rolling snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.snapshot.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.snapshot.outputs.name }}
          prerelease: true
          make_latest: false
          generate_release_notes: false
          overwrite_files: true
          body: |
            Automated unsigned desktop snapshot for `${{ github.ref_name }}`.
            Commit: `${{ github.sha }}`
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            release-assets/*
