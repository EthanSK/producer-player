name: Release Desktop
run-name: >-
  ${{ (github.event.head_commit
      && startsWith(github.event.head_commit.message, 'chore: bump version')
      && github.event.commits[0].message != github.event.head_commit.message
      && github.event.commits[0].message)
      || (github.event.head_commit && github.event.head_commit.message)
      || '' }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  compute-version:
    name: Compute release metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      display_version: ${{ steps.meta.outputs.display_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_tag_release: ${{ steps.meta.outputs.is_tag_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync and verify version metadata
        run: |
          npm run version:sync
          npm run version:check

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          app_version="$(node -p "require('./package.json').version")"
          if [[ ! "$app_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::package.json version '$app_version' is not a supported semantic version."
            exit 1
          fi

          # Two-part display version (strip trailing .0 patch)
          display_version="$app_version"
          if [[ "$app_version" =~ ^([0-9]+\.[0-9]+)\.0$ ]]; then
            display_version="${BASH_REMATCH[1]}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            tag_version="${release_tag#v}"
            tag_base="${tag_version%%-*}"
            tag_base="${tag_base%%+*}"

            # Accept tags matching either full semver (v2.14.0) or display version (v2.14)
            if [[ "$tag_version" != "$app_version" && "$tag_base" != "$app_version" && "$tag_version" != "$display_version" && "$tag_base" != "$display_version" ]]; then
              echo "::error::Tag '${release_tag}' does not match package.json version '${display_version}'."
              echo "::error::Use v${display_version} (or v${display_version}-build.<n>) for this commit."
              exit 1
            fi

            if [[ "$tag_version" == "$app_version" || "$tag_version" == "$display_version" ]]; then
              release_name="Producer Player v${display_version}"
            else
              release_name="Producer Player ${release_tag}"
            fi

            echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
            echo "display_version=${display_version}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
            echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          build_num="${GITHUB_RUN_NUMBER}"
          canonical_tag="v${display_version}"

          if git ls-remote --tags --refs origin "${canonical_tag}" | grep -q .; then
            release_tag="v${display_version}-build.${build_num}"
            release_name="Producer Player v${display_version} (build ${build_num})"
          else
            release_tag="${canonical_tag}"
            release_name="Producer Player v${display_version}"
          fi

          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "display_version=${display_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "is_tag_release=false" >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Build desktop (${{ matrix.slug }})
    needs: compute-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            slug: mac
          - runner: ubuntu-latest
            slug: linux
          - runner: windows-latest
            slug: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify unified version configuration
        run: |
          npm run version:sync
          npm run version:check

      # ─── macOS Code Signing & Notarization ───────────────────────────
      # To enable signed + notarized macOS builds, add these GitHub Actions
      # secrets in the repo settings (Settings → Secrets and variables → Actions):
      #
      #   CSC_LINK                     – base64-encoded .p12 certificate
      #                                  (export from Keychain → base64 -i cert.p12 | pbcopy)
      #   CSC_KEY_PASSWORD             – password used when exporting the .p12
      #   APPLE_ID                     – Apple ID email for notarization
      #   APPLE_APP_SPECIFIC_PASSWORD  – app-specific password (appleid.apple.com → Security)
      #   APPLE_TEAM_ID                – 10-character Apple Developer Team ID
      #
      # electron-builder reads CSC_LINK / CSC_KEY_PASSWORD automatically.
      # The notarize.js afterSign hook reads the APPLE_* variables.
      # If secrets are not set the build produces an unsigned binary (no error).
      # ─────────────────────────────────────────────────────────────────

      - name: Build desktop package
        env:
          PRODUCER_PLAYER_BUILD_NUMBER: ${{ github.run_number }}
          PRODUCER_PLAYER_COMMIT_SHA: ${{ github.sha }}
          # macOS signing (only populated when secrets exist)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:desktop:${{ matrix.slug }}

      - name: Generate SHA-256 checksum (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release/Producer-Player-*-${{ matrix.slug }}-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No ZIP artifacts found for ${{ matrix.slug }}"
            exit 1
          fi
          for f in "${files[@]}"; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release -Filter "Producer-Player-*-win-*.zip"
          if (-not $files) { throw "No ZIP artifacts found for win" }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)" | Out-File -FilePath "$($file.FullName).sha256" -Encoding ascii
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.slug }}-${{ github.ref_name }}
          path: |
            release/Producer-Player-*-${{ matrix.slug }}-*.zip
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.sha256
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs:
      - compute-version
      - build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      - name: Create stable latest-download aliases
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          shopt -s nullglob

          patterns=(
            "Producer-Player-*-mac-universal.zip"
            "Producer-Player-*-linux-x64.zip"
            "Producer-Player-*-win-x64.zip"
          )

          aliases=(
            "Producer-Player-latest-mac-universal.zip"
            "Producer-Player-latest-linux-x64.zip"
            "Producer-Player-latest-win-x64.zip"
          )

          for i in "${!patterns[@]}"; do
            pattern="${patterns[$i]}"
            alias_name="${aliases[$i]}"
            matches=($pattern)

            if [ ${#matches[@]} -ne 1 ]; then
              echo "Expected exactly one match for pattern '$pattern', got ${#matches[@]}"
              ls -lah
              exit 1
            fi

            src="${matches[0]}"
            cp "$src" "$alias_name"

            src_sha="$src.sha256"
            if [ -f "$src_sha" ]; then
              hash_value="$(awk '{print $1}' "$src_sha")"
              echo "$hash_value  $alias_name" > "$alias_name.sha256"
            fi
          done

      - name: Show assets
        run: ls -lah release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute-version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.compute-version.outputs.release_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body: |
            ## Producer Player v${{ needs.compute-version.outputs.display_version }}

            **Stable direct latest-download links** (auto-follow new releases):

            | Platform | Stable URL |
            |----------|------------|
            | macOS (Universal: Apple Silicon + Intel) | `https://github.com/${{ github.repository }}/releases/latest/download/Producer-Player-latest-mac-universal.zip` |
            | Linux (x64) | `https://github.com/${{ github.repository }}/releases/latest/download/Producer-Player-latest-linux-x64.zip` |
            | Windows (x64) | `https://github.com/${{ github.repository }}/releases/latest/download/Producer-Player-latest-win-x64.zip` |

            Versioned assets are attached below for auditing/reproducibility.

            Commit: `${{ github.sha }}`
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            release-assets/*
