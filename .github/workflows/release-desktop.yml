name: Release Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  compute-version:
    name: Compute build/release version
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.meta.outputs.build_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_branch_build: ${{ steps.meta.outputs.is_branch_build }}
      is_tag_release: ${{ steps.meta.outputs.is_tag_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          fallback_version="$(node -p "require('./package.json').version")"

          bump_semver() {
            local version="$1"
            local level="$2"
            local major minor patch
            IFS='.' read -r major minor patch <<< "$version"

            case "$level" in
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              *)
                patch=$((patch + 1))
                ;;
            esac

            printf '%s.%s.%s' "$major" "$minor" "$patch"
          }

          latest_tag="$(git ls-remote --tags --refs origin 'v*' | awk -F/ '{print $3}' | sort -V | tail -n 1 || true)"
          latest_base_version="$(printf '%s' "$latest_tag" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*/\1/' || true)"

          if [[ -n "$latest_base_version" ]]; then
            base_version="$latest_base_version"
          else
            base_version="$fallback_version"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            echo "build_version=${tag_version}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=Producer Player ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "is_branch_build=false" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
            build_num="${GITHUB_RUN_NUMBER}"
            commit_subject="$(git log -1 --pretty=%s)"
            commit_body="$(git log -1 --pretty=%b)"
            commit_text="$(printf '%s\n%s' "$commit_subject" "$commit_body")"
            bump_level="patch"

            if printf '%s' "$commit_text" | grep -Eiq '(^feat(\(|:))|(\[minor\])'; then
              bump_level="minor"
            fi

            next_version="$(bump_semver "$base_version" "$bump_level")"

            echo "build_version=${next_version}" >> "$GITHUB_OUTPUT"
            echo "release_tag=v${next_version}-${build_num}" >> "$GITHUB_OUTPUT"
            echo "release_name=Producer Player v${next_version} (build ${build_num})" >> "$GITHUB_OUTPUT"
            echo "is_branch_build=true" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "build_version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=" >> "$GITHUB_OUTPUT"
          echo "release_name=" >> "$GITHUB_OUTPUT"
          echo "is_branch_build=false" >> "$GITHUB_OUTPUT"
          echo "is_tag_release=false" >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Build desktop (${{ matrix.slug }})
    needs: compute-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            slug: mac
          - runner: ubuntu-latest
            slug: linux
          - runner: windows-latest
            slug: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build version
        if: needs.compute-version.outputs.is_branch_build == 'true' || needs.compute-version.outputs.is_tag_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ needs.compute-version.outputs.build_version }}" --no-git-tag-version --allow-same-version

      # ─── macOS Code Signing & Notarization ───────────────────────────
      # To enable signed + notarized macOS builds, add these GitHub Actions
      # secrets in the repo settings (Settings → Secrets and variables → Actions):
      #
      #   CSC_LINK                     – base64-encoded .p12 certificate
      #                                  (export from Keychain → base64 -i cert.p12 | pbcopy)
      #   CSC_KEY_PASSWORD             – password used when exporting the .p12
      #   APPLE_ID                     – Apple ID email for notarization
      #   APPLE_APP_SPECIFIC_PASSWORD  – app-specific password (appleid.apple.com → Security)
      #   APPLE_TEAM_ID                – 10-character Apple Developer Team ID
      #
      # electron-builder reads CSC_LINK / CSC_KEY_PASSWORD automatically.
      # The notarize.js afterSign hook reads the APPLE_* variables.
      # If secrets are not set the build produces an unsigned binary (no error).
      # ─────────────────────────────────────────────────────────────────

      - name: Build desktop package
        env:
          # macOS signing (only populated when secrets exist)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:desktop:${{ matrix.slug }}

      - name: Generate SHA-256 checksum (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release/Producer-Player-*-${{ matrix.slug }}-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No ZIP artifacts found for ${{ matrix.slug }}"
            exit 1
          fi
          for f in "${files[@]}"; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release -Filter "Producer-Player-*-win-*.zip"
          if (-not $files) { throw "No ZIP artifacts found for win" }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)" | Out-File -FilePath "$($file.FullName).sha256" -Encoding ascii
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.slug }}-${{ github.ref_name }}
          path: |
            release/Producer-Player-*-${{ matrix.slug }}-*.zip
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.sha256
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.blockmap
          if-no-files-found: error

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs:
      - compute-version
      - build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      - name: Create stable latest-download aliases
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          shopt -s nullglob

          patterns=(
            "Producer-Player-*-mac-universal.zip"
            "Producer-Player-*-linux-x64.zip"
            "Producer-Player-*-win-x64.zip"
          )

          aliases=(
            "Producer-Player-latest-mac-universal.zip"
            "Producer-Player-latest-linux-x64.zip"
            "Producer-Player-latest-win-x64.zip"
          )

          for i in "${!patterns[@]}"; do
            pattern="${patterns[$i]}"
            alias_name="${aliases[$i]}"
            matches=($pattern)

            if [ ${#matches[@]} -ne 1 ]; then
              echo "Expected exactly one match for pattern '$pattern', got ${#matches[@]}"
              ls -lah
              exit 1
            fi

            src="${matches[0]}"
            cp "$src" "$alias_name"

            src_sha="$src.sha256"
            if [ -f "$src_sha" ]; then
              hash_value="$(awk '{print $1}' "$src_sha")"
              echo "$hash_value  $alias_name" > "$alias_name.sha256"
            fi
          done

      - name: Show assets
        run: ls -lah release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute-version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.compute-version.outputs.release_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body: |
            ## Producer Player v${{ needs.compute-version.outputs.build_version }}

            **Stable direct latest-download links** (auto-follow new releases):

            | Platform | Stable URL |
            |----------|------------|
            | macOS (Universal: Apple Silicon + Intel) | `https://github.com/${{ github.repository }}/releases/latest/download/Producer-Player-latest-mac-universal.zip` |
            | Linux (x64) | `https://github.com/${{ github.repository }}/releases/latest/download/Producer-Player-latest-linux-x64.zip` |
            | Windows (x64) | `https://github.com/${{ github.repository }}/releases/latest/download/Producer-Player-latest-win-x64.zip` |

            Versioned assets are attached below for auditing/reproducibility.

            Commit: `${{ github.sha }}`
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            release-assets/*
