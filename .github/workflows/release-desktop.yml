name: Release Desktop
run-name: >-
  ${{ (github.event.head_commit
      && startsWith(github.event.head_commit.message, 'chore: bump version')
      && github.event.commits[0].message != github.event.head_commit.message
      && github.event.commits[0].message)
      || (github.event.head_commit && github.event.head_commit.message)
      || '' }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  compute-version:
    name: Compute release metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      display_version: ${{ steps.meta.outputs.display_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_tag_release: ${{ steps.meta.outputs.is_tag_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync and verify version metadata
        run: |
          npm run version:sync
          npm run version:check

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          app_version="$(node -p "require('./package.json').version")"
          if [[ ! "$app_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::package.json version '$app_version' is not a supported semantic version."
            exit 1
          fi

          # Two-part display version (strip trailing .0 patch)
          display_version="$app_version"
          if [[ "$app_version" =~ ^([0-9]+\.[0-9]+)\.0$ ]]; then
            display_version="${BASH_REMATCH[1]}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            tag_version="${release_tag#v}"
            tag_base="${tag_version%%-*}"
            tag_base="${tag_base%%+*}"

            # Accept tags matching either full semver (v2.14.0) or display version (v2.14)
            if [[ "$tag_version" != "$app_version" && "$tag_base" != "$app_version" && "$tag_version" != "$display_version" && "$tag_base" != "$display_version" ]]; then
              echo "::error::Tag '${release_tag}' does not match package.json version '${display_version}'."
              echo "::error::Use v${display_version} (or v${display_version}-build.<n>) for this commit."
              exit 1
            fi

            if [[ "$tag_version" == "$app_version" || "$tag_version" == "$display_version" ]]; then
              release_name="Producer Player v${display_version}"
            else
              release_name="Producer Player ${release_tag}"
            fi

            echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
            echo "display_version=${display_version}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
            echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          build_num="${GITHUB_RUN_NUMBER}"
          canonical_tag="v${display_version}"

          if git ls-remote --tags --refs origin "${canonical_tag}" | grep -q .; then
            release_tag="v${display_version}-build.${build_num}"
            release_name="Producer Player v${display_version} (build ${build_num})"
          else
            release_tag="${canonical_tag}"
            release_name="Producer Player v${display_version}"
          fi

          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "display_version=${display_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "is_tag_release=false" >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Build desktop (${{ matrix.slug }})
    needs: compute-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            slug: mac
          - runner: ubuntu-latest
            slug: linux
          - runner: windows-latest
            slug: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Note: the pp-audio-host JUCE sidecar is macOS-only and is gated to
      # darwin inside apps/electron/scripts/build-main.mjs. Linux/Windows
      # runners skip the native build entirely, so their APT/MSVC sidecar
      # toolchains don't need to be provisioned here.

      - name: Verify unified version configuration
        run: |
          npm run version:sync
          npm run version:check

      # ─── macOS Code Signing & Notarization ───────────────────────────
      # To enable signed + notarized macOS builds, add these GitHub Actions
      # secrets in the repo settings (Settings → Secrets and variables → Actions):
      #
      #   CSC_LINK                     – base64-encoded .p12 certificate
      #                                  (export from Keychain → base64 -i cert.p12 | pbcopy)
      #   CSC_KEY_PASSWORD             – password used when exporting the .p12
      #   APPLE_ID                     – Apple ID email for notarization
      #   APPLE_APP_SPECIFIC_PASSWORD  – app-specific password (appleid.apple.com → Security)
      #   APPLE_TEAM_ID                – 10-character Apple Developer Team ID
      #
      # electron-builder reads CSC_LINK / CSC_KEY_PASSWORD automatically.
      # The notarize.js afterSign hook reads the APPLE_* variables.
      # If secrets are not set the build produces an unsigned binary (no error).
      # ─────────────────────────────────────────────────────────────────

      - name: Build desktop package
        id: build_desktop
        env:
          PRODUCER_PLAYER_BUILD_NUMBER: ${{ github.run_number }}
          PRODUCER_PLAYER_COMMIT_SHA: ${{ github.sha }}
          # macOS signing (only populated when secrets exist)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:desktop:${{ matrix.slug }}

      # BUG FIX (2026-04-16, 68fd717): every Release Desktop run since 2026-04-12 failed silently
      # at notarization 403. Users stuck on v2.82 for days with no visible error. This annotation
      # surfaces the failure mode loudly so it can't happen again.
      - name: Annotate notarization failure
        if: failure() && matrix.slug == 'mac'
        shell: bash
        run: |
          echo "::error title=macOS notarization failed::The macOS build failed, most likely because the Apple Developer Program License Agreement needs to be re-accepted at https://developer.apple.com/account/ (look for the yellow banner). After accepting it, re-run this workflow to publish the macOS update. Until then existing installs will see 'You are up to date' on the previously published version even though new versions exist in the repo."

      - name: Generate SHA-256 checksum (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release/Producer-Player-*-${{ matrix.slug }}-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No ZIP artifacts found for ${{ matrix.slug }}"
            exit 1
          fi
          for f in "${files[@]}"; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release -Filter "Producer-Player-*-win-*.zip"
          if (-not $files) { throw "No ZIP artifacts found for win" }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)" | Out-File -FilePath "$($file.FullName).sha256" -Encoding ascii
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.slug }}-${{ github.ref_name }}
          path: |
            release/Producer-Player-*-${{ matrix.slug }}-*.zip
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.sha256
            release/Producer-Player-*-${{ matrix.slug }}-*.zip.blockmap
            release/latest*.yml
          if-no-files-found: error

  publish-release:
    name: Publish release
    # Run as long as compute-version succeeded — even if some build-desktop
    # matrix legs failed. This way a single-platform failure (typically mac
    # notarization waiting on an Apple agreement re-acceptance) does not
    # strand the OTHER platforms' users on stale versions. The macOS users
    # remain stranded until the agreement is fixed and the workflow is
    # re-run, but linux/win users continue to receive updates.
    if: |
      always() &&
      needs.compute-version.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs:
      - compute-version
      - build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-${{ github.ref_name }}
          merge-multiple: true
          path: release-assets

      # Bail clearly if NO platform built. Otherwise continue and only ship
      # the platforms that did build.
      - name: Verify at least one platform built
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mac_zips=(release-assets/Producer-Player-*-mac-universal.zip)
          linux_zips=(release-assets/Producer-Player-*-linux-x64.zip)
          win_zips=(release-assets/Producer-Player-*-win-x64.zip)
          if [ ${#mac_zips[@]} -eq 0 ] && [ ${#linux_zips[@]} -eq 0 ] && [ ${#win_zips[@]} -eq 0 ]; then
            echo "::error title=No platform builds succeeded::Every platform's build job failed; nothing to publish. See the build-desktop job logs."
            exit 1
          fi
          if [ ${#mac_zips[@]} -eq 0 ]; then
            echo "::warning title=Skipping macOS in this release::No mac build artifact present (mac job likely failed). Existing macOS users will stay on the last successfully published macOS version. Re-run this workflow once mac notarization is restored."
          fi
          if [ ${#linux_zips[@]} -eq 0 ]; then
            echo "::warning title=Skipping Linux in this release::No linux build artifact present."
          fi
          if [ ${#win_zips[@]} -eq 0 ]; then
            echo "::warning title=Skipping Windows in this release::No windows build artifact present."
          fi

      - name: Create stable latest-download aliases
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          shopt -s nullglob

          patterns=(
            "Producer-Player-*-mac-universal.zip"
            "Producer-Player-*-linux-x64.zip"
            "Producer-Player-*-win-x64.zip"
          )

          aliases=(
            "Producer-Player-latest-mac-universal.zip"
            "Producer-Player-latest-linux-x64.zip"
            "Producer-Player-latest-win-x64.zip"
          )

          for i in "${!patterns[@]}"; do
            pattern="${patterns[$i]}"
            alias_name="${aliases[$i]}"
            matches=($pattern)

            if [ ${#matches[@]} -eq 0 ]; then
              # Platform's build job failed — skip its alias rather than
              # failing the whole release. Other platforms still publish.
              echo "::warning title=Missing build for $pattern::Skipping latest-alias for $alias_name; that platform did not build."
              continue
            fi

            if [ ${#matches[@]} -gt 1 ]; then
              echo "Expected at most one match for pattern '$pattern', got ${#matches[@]}"
              ls -lah
              exit 1
            fi

            src="${matches[0]}"
            cp "$src" "$alias_name"

            src_sha="$src.sha256"
            if [ -f "$src_sha" ]; then
              hash_value="$(awk '{print $1}' "$src_sha")"
              echo "$hash_value  $alias_name" > "$alias_name.sha256"
            fi
          done

      - name: Show assets
        run: ls -lah release-assets

      # Guard against electron-builder regressions that produce a malformed
      # `latest-mac.yml` (missing sha512 / size / path) — if that ships,
      # existing macOS installs silently get "You're up to date" forever
      # because electron-updater rejects the feed.
      # See scripts/check-latest-mac-yml.mjs for the checks performed.
      - name: Validate latest-*.yml feed files
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.compute-version.outputs.app_version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          ymls=(release-assets/latest*.yml)
          if [ ${#ymls[@]} -eq 0 ]; then
            echo "::warning title=No latest-*.yml published::electron-updater clients will not discover this release. Verify the electron-builder publish step ran."
            exit 0
          fi
          for f in "${ymls[@]}"; do
            node scripts/check-latest-mac-yml.mjs "$f"
          done

      - name: Generate changelog from commits
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${{ needs.compute-version.outputs.release_tag }}"

          # Fetch all tags so we can find the previous one
          git fetch --tags --force 2>/dev/null || true

          # Find previous tag by listing all tags sorted by version. If the
          # current tag already exists in the repo (retriggered build), pick
          # the entry right after it; otherwise fall back to the newest
          # existing tag. Guard every pipeline so a missing match under
          # `pipefail` doesn't abort the step.
          all_tags="$(git tag --sort=-version:refname || true)"
          prev_tag=""
          if [ -n "$all_tags" ]; then
            found_current=0
            while IFS= read -r tag; do
              if [ "$found_current" -eq 1 ]; then
                prev_tag="$tag"
                break
              fi
              if [ "$tag" = "$current_tag" ]; then
                found_current=1
              fi
            done <<< "$all_tags"

            if [ -z "$prev_tag" ]; then
              # Current tag not found (typical for a fresh release) — fall
              # back to the newest existing tag that isn't the current one.
              while IFS= read -r tag; do
                if [ "$tag" != "$current_tag" ] && [ -n "$tag" ]; then
                  prev_tag="$tag"
                  break
                fi
              done <<< "$all_tags"
            fi
          fi
          if [ -z "$prev_tag" ]; then
            # Fallback: get first commit
            prev_tag="$(git rev-list --max-parents=0 HEAD)"
          fi

          # If current_tag isn't a valid git ref yet (typical for fresh
          # releases on branch pushes), use HEAD instead.
          log_end="${current_tag}"
          if ! git rev-parse --verify "${current_tag}" >/dev/null 2>&1; then
            log_end="HEAD"
          fi

          echo "Generating changelog: ${prev_tag}..${log_end}"

          features=""
          fixes=""
          maintenance=""
          docs=""
          other=""

          while IFS= read -r line; do
            # Strip leading short hash
            msg="${line#* }"
            if [[ "$msg" == feat:* ]]; then
              features="${features}\n- ${msg#feat: }"
            elif [[ "$msg" == feat\(* ]]; then
              features="${features}\n- ${msg}"
            elif [[ "$msg" == fix:* ]]; then
              fixes="${fixes}\n- ${msg#fix: }"
            elif [[ "$msg" == fix\(* ]]; then
              fixes="${fixes}\n- ${msg}"
            elif [[ "$msg" == chore:* || "$msg" == refactor:* ]]; then
              if [[ "$msg" != *"bump version"* ]]; then
                maintenance="${maintenance}\n- ${msg#chore: }"
              fi
            elif [[ "$msg" == docs:* ]]; then
              docs="${docs}\n- ${msg#docs: }"
            elif [[ "$msg" == doc:* ]]; then
              docs="${docs}\n- ${msg#doc: }"
            elif [[ "$msg" != *"bump version"* && "$msg" != "Merge "* ]]; then
              other="${other}\n- ${msg}"
            fi
          done < <(git log --oneline "${prev_tag}..${log_end}" --)

          changelog=""
          if [ -n "$features" ]; then
            changelog="${changelog}### Features${features}\n\n"
          fi
          if [ -n "$fixes" ]; then
            changelog="${changelog}### Fixes${fixes}\n\n"
          fi
          if [ -n "$maintenance" ]; then
            changelog="${changelog}### Maintenance${maintenance}\n\n"
          fi
          if [ -n "$docs" ]; then
            changelog="${changelog}### Documentation${docs}\n\n"
          fi
          if [ -n "$other" ]; then
            changelog="${changelog}### Other${other}\n\n"
          fi

          if [ -z "$changelog" ]; then
            changelog="Maintenance release.\n"
          fi

          # Write to file to avoid escaping issues
          printf "%b" "$changelog" > /tmp/release_changelog.md
          echo "prev_tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Compose release body
        shell: bash
        run: |
          set -euo pipefail

          display_version="${{ needs.compute-version.outputs.display_version }}"
          repo="${{ github.repository }}"
          sha="${{ github.sha }}"
          run_id="${{ github.run_id }}"
          prev_tag="${{ steps.changelog.outputs.prev_tag }}"
          release_tag="${{ needs.compute-version.outputs.release_tag }}"

          {
            echo "## Producer Player v${display_version}"
            echo ""
            echo "## What's New"
            echo ""
            cat /tmp/release_changelog.md
            echo "---"
            echo ""
            echo "**Stable direct latest-download links** (auto-follow new releases):"
            echo ""
            echo "| Platform | Stable URL |"
            echo "|----------|------------|"
            echo "| macOS (Universal: Apple Silicon + Intel) | \`https://github.com/${repo}/releases/latest/download/Producer-Player-latest-mac-universal.zip\` |"
            echo "| Linux (x64) | \`https://github.com/${repo}/releases/latest/download/Producer-Player-latest-linux-x64.zip\` |"
            echo "| Windows (x64) | \`https://github.com/${repo}/releases/latest/download/Producer-Player-latest-win-x64.zip\` |"
            echo ""
            echo "Versioned assets are attached below for auditing/reproducibility."
            echo ""
            echo "Commit: \`${sha}\`"
            echo "Workflow run: https://github.com/${repo}/actions/runs/${run_id}"
            echo ""
            echo "**Full Changelog**: https://github.com/${repo}/compare/${prev_tag}...${release_tag}"
          } > /tmp/release_body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute-version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.compute-version.outputs.release_name }}
          prerelease: false
          make_latest: true
          body_path: /tmp/release_body.md
          files: |
            release-assets/*
